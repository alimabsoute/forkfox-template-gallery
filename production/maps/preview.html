<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SF + Philly map preview</title>
<style>
body{background:#0a0a0a;margin:0;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px;font-family:system-ui;color:#fff}
.card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:14px;overflow:hidden}
.card img{width:100%;display:block;aspect-ratio:4/5;object-fit:cover}
.label{padding:12px 16px;font-size:13px;color:#aaa}
</style></head><body>
<div class="card"><img src="sf.svg" alt="SF map"><div class="label">San Francisco</div></div>
<div class="card"><img src="philly.svg" alt="Philly map"><div class="label">Philadelphia</div></div>
</body></html>
